<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <!-- Modern Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 800px;
        }

        h2 {
            text-align: center;
            color: #38bdf8;
            margin-bottom: 8px;
            font-weight: 600;
        }

        p.subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 48px;
            font-weight: 600;
            color: #38bdf8;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 18px;
            color: #cbd5e1;
            font-weight: 500;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 16px;
        }

        .back-link:hover {
            color: #38bdf8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Admin Panel</h2>
        <p class="subtitle">Transaction Statistics Overview</p>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number">{{ total_transactions }}</div>
                <div class="stat-label">Total Transactions</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">Rs. {{ "%.2f"|format(total_income) }}</div>
                <div class="stat-label">Total Income</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">{{ total_fraud }}</div>
                <div class="stat-label">Total Fraud Transactions</div>
            </div>
        </div>

        <a href="/" class="back-link">← Back to Home</a>
    </div>
</body>
</html>
